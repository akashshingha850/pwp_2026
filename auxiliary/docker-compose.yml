services:
  motion:
    build:
      context: .
      dockerfile: motion/Dockerfile
    image: motion-detector
    container_name: motion-detector
    privileged: true
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      # - ./captures:/app/captures
      - /run/udev:/run/udev:ro
      - /dev:/dev
    restart: "unless-stopped"

  config:
    build:
      context: .
      dockerfile: config/Dockerfile
    image: config-listener
    container_name: config-listener
    env_file: config/.env
    volumes:
      - ./config.yaml:/app/config.yaml
    restart: "unless-stopped"
