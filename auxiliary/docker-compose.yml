services:
  motion:
    build:
      context: .
      dockerfile: motion/Dockerfile
    image: motion-detector:pi
    container_name: motion-detector
    privileged: true
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./captures:/app/captures
      - /run/udev:/run/udev:ro
      - /dev:/dev
    restart: "no"
