openapi: 3.0.4
info:
  title: EyesEdge API
  version: 1.0.0
  description: >
    API documentation for the EyesEdge project. This spec reflects the currently
    implemented Django REST Framework endpoints in `cameras`, `motions`, and
    `images` apps.

servers:
  - url: /api
    description: Base URL prefix configured in the Django router.

tags:
  - name: auth
  - name: cameras
  - name: motions
  - name: images

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token auth using header value format `Token <token>`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: integer
        minimum: 1
    CameraAddressFilter:
      name: address
      in: query
      required: false
      schema:
        type: string
        format: uri
    CameraResolutionFilter:
      name: resolution
      in: query
      required: false
      schema:
        type: string
        enum: ["1280x720", "1920x1080", "3840x2160"]
    CameraFpsFilter:
      name: fps
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    CameraStatusFilter:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [active, inactive]
    MotionDurationFilter:
      name: duration
      in: query
      required: false
      schema:
        type: number
        minimum: 0
    MotionThresholdFilter:
      name: threshold
      in: query
      required: false
      schema:
        type: number
        minimum: 0
        maximum: 1
    MotionTimestampFilter:
      name: timestamp
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ImageMotionEventFilter:
      name: motion_event
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ImageFilepathFilter:
      name: filepath
      in: query
      required: false
      schema:
        type: string
        format: uri
    ImageFilesizeFilter:
      name: filesize
      in: query
      required: false
      schema:
        type: integer
        minimum: 0

  schemas:
    AuthTokenRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
      example:
        username: admin
        password: secret123

    AuthTokenResponse:
      type: object
      properties:
        token:
          type: string
      required: [token]
      example:
        token: 9944b09199c62bcf9418ad846dd0e4bbdfc6ee4b

    DetailError:
      type: object
      properties:
        detail:
          type: string
      example:
        detail: Not authenticated.

    ValidationError:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        address:
          - This field is required.

    Camera:
      type: object
      required: [address, resolution]
      additionalProperties: false
      properties:
        id:
          type: integer
          readOnly: true
        address:
          type: string
          format: uri
        resolution:
          type: string
          enum: ["1280x720", "1920x1080", "3840x2160"]
        fps:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [active, inactive]
      example:
        id: 1
        address: http://192.168.1.100/stream
        resolution: "1920x1080"
        fps: 25
        status: active

    MotionEvent:
      type: object
      required: [camera, duration]
      additionalProperties: false
      properties:
        id:
          type: integer
          readOnly: true
        camera:
          type: integer
          minimum: 1
        timestamp:
          type: string
          format: date-time
          readOnly: true
        duration:
          type: number
          minimum: 0
        threshold:
          type: number
          minimum: 0
          maximum: 1
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 10
        camera: 1
        timestamp: "2026-04-12T10:30:00Z"
        duration: 5.5
        threshold: 0.25
        created_at: "2026-04-12T10:30:00Z"

    Image:
      type: object
      required: [motion_event, filepath]
      additionalProperties: false
      properties:
        id:
          type: integer
          readOnly: true
        camera:
          type: integer
          readOnly: true
          description: Derived from the related motion event.
        motion_event:
          type: integer
          minimum: 1
        filepath:
          type: string
          format: uri
        filesize:
          type: integer
          nullable: true
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 105
        camera: 1
        motion_event: 10
        filepath: http://storage.local/snapshots/105.jpg
        filesize: 102400
        created_at: "2026-04-12T10:30:02Z"

security:
  - TokenAuth: []

paths:
  /token/:
    post:
      tags: [auth]
      summary: Obtain authentication token
      description: Returns DRF auth token used in `Authorization` header.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequest'
      responses:
        '200':
          description: Token created/returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid credentials payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /cameras/:
    get:
      tags: [cameras]
      summary: List cameras
      parameters:
        - $ref: '#/components/parameters/CameraAddressFilter'
        - $ref: '#/components/parameters/CameraResolutionFilter'
        - $ref: '#/components/parameters/CameraFpsFilter'
        - $ref: '#/components/parameters/CameraStatusFilter'
      responses:
        '200':
          description: List of camera resources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Camera'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    post:
      tags: [cameras]
      summary: Create camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Camera'
      responses:
        '201':
          description: Camera created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /cameras/{id}/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [cameras]
      summary: Retrieve camera
      responses:
        '200':
          description: Camera resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Camera not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    put:
      tags: [cameras]
      summary: Update camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Camera'
      responses:
        '200':
          description: Camera updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Camera not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    delete:
      tags: [cameras]
      summary: Delete camera
      responses:
        '204':
          description: Camera deleted.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Camera not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /cameras/{id}/motions/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [cameras, motions]
      summary: List motions by camera
      parameters:
        - $ref: '#/components/parameters/MotionDurationFilter'
        - $ref: '#/components/parameters/MotionThresholdFilter'
        - $ref: '#/components/parameters/MotionTimestampFilter'
      responses:
        '200':
          description: Motion events for a camera.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MotionEvent'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    post:
      tags: [cameras, motions]
      summary: Create motion event for camera
      description: The camera is forced from path parameter `{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [duration]
              properties:
                duration:
                  type: number
                  minimum: 0
                threshold:
                  type: number
                  minimum: 0
                  maximum: 1
            example:
              duration: 4.2
              threshold: 0.35
      responses:
        '201':
          description: Motion event created.
          headers:
            Location:
              description: URL of created motion event.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionEvent'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /motions/:
    get:
      tags: [motions]
      summary: List motion events
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: camera
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/MotionDurationFilter'
        - $ref: '#/components/parameters/MotionThresholdFilter'
        - $ref: '#/components/parameters/MotionTimestampFilter'
        - name: created_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of motion events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MotionEvent'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    post:
      tags: [motions]
      summary: Create motion event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionEvent'
      responses:
        '201':
          description: Motion event created.
          headers:
            Location:
              description: URL of created motion event.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionEvent'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /motions/{id}/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [motions]
      summary: Retrieve motion event
      responses:
        '200':
          description: Motion event resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionEvent'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Motion event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    put:
      tags: [motions]
      summary: Update motion event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MotionEvent'
      responses:
        '200':
          description: Motion event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MotionEvent'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Motion event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    delete:
      tags: [motions]
      summary: Delete motion event
      responses:
        '204':
          description: Motion event deleted.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Motion event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /motions/{id}/images/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [motions, images]
      summary: List images by motion event
      parameters:
        - name: id
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - $ref: '#/components/parameters/ImageFilepathFilter'
        - $ref: '#/components/parameters/ImageFilesizeFilter'
        - name: created_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/ImageMotionEventFilter'
      responses:
        '200':
          description: Images for selected motion event.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    post:
      tags: [motions, images]
      summary: Create image under motion event
      description: The `motion_event` value is forced from path parameter `{id}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filepath]
              properties:
                filepath:
                  type: string
                  format: uri
                filesize:
                  type: integer
                  nullable: true
                  minimum: 0
            example:
              filepath: http://storage.local/snapshots/210.jpg
              filesize: 85412
      responses:
        '201':
          description: Image created.
          headers:
            Location:
              description: URL of created image.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /images/:
    get:
      tags: [images]
      summary: List images
      description: Cached for 300 seconds and varied by Authorization header.
      parameters:
        - $ref: '#/components/parameters/ImageMotionEventFilter'
      responses:
        '200':
          description: List of image resources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    post:
      tags: [images]
      summary: Create image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Image'
      responses:
        '201':
          description: Image created.
          headers:
            Location:
              description: URL of created image.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'

  /images/{id}/:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [images]
      summary: Retrieve image
      responses:
        '200':
          description: Image resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Image not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    put:
      tags: [images]
      summary: Update image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Image'
      responses:
        '200':
          description: Image updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Image not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
    delete:
      tags: [images]
      summary: Delete image
      responses:
        '204':
          description: Image deleted.
        '401':
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'
        '404':
          description: Image not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailError'